dvh_fam_fp:
  target: "{{env_var('DBT_DB_TARGET')}}"
  outputs:
    knast:
      host: "{{env_var('DBT_DB_HOST')}}"
      password: placeholder
      port: "{{env_var('DBT_DB_PORT')}}"
      protocol: tcp
      schema: dvh_fam_ungdom
      service: "{{env_var('DBT_ENV_SERVICE')}}"
      database: "{{env_var('DBT_DB_NAME')}}"
      threads: 8
      type: oracle
      user: "{{env_var('DBT_ENV_SECRET_USER')}}"
      session_info:
        client_info: "{{env_var('DBT_ORCL_USER_PROXY', 'DVH_FAM_DBT')}}"
        module: "{{env_var('AIRFLOW_DAG_ID', 'dvh_fam_fp')}}"
        action: "Kjører utpakking av foreldrepenger data"
config:
  send_anonymous_usage_stats: False

